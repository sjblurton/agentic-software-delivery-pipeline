name: E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests (${{ matrix.auth-mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        auth-mode: [logged-in, logged-out]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/app_test
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: e2e-publishable-key
      E2E_AUTH_MODE: ${{ matrix.auth-mode }}
      E2E_TEST_USER_ID: e2e-user-id
      E2E_TEST_USER_EMAIL: e2e@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare auth schema for Drizzle references
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/app_test -c "CREATE SCHEMA IF NOT EXISTS auth;"
          psql postgresql://postgres:postgres@127.0.0.1:5432/app_test -c "CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);"
      - name: Apply database schema
        run: pnpm drizzle-kit push --force
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e suite
        run: pnpm test:e2e
