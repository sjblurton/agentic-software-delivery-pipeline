name: Visual Regression

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  visual-regression:
    name: Storybook visual regression
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_VISUAL_BASE_URL: http://127.0.0.1:6006
      PLAYWRIGHT_VISUAL_WEB_SERVER_COMMAND: >-
        python3 -m http.server 6006 --directory storybook-static --bind 127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run visual regression
        id: visual-compare
        continue-on-error: true
        run: pnpm ci:visual
      - name: Generate candidate baseline updates
        if: steps.visual-compare.outcome == 'failure'
        run: pnpm ci:visual:update
      - name: Detect baseline file changes
        id: baseline-changes
        run: |
          git status --porcelain -- tests/visual > visual-snapshot-changes.txt
          if [ -s visual-snapshot-changes.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload visual regression artifacts
        if: steps.visual-compare.outcome == 'failure' || steps.baseline-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          path: |
            playwright-report
            test-results
            tests/visual
            visual-snapshot-changes.txt
